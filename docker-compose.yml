version: "3.9"

services:

  mongo:
    image: mongo:7
    container_name: netflix-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - netflix-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: netflix-redis
    restart: unless-stopped
    networks:
      - netflix-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: netflix-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - netflix-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build: ./backend
    container_name: netflix-backend
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: netflix
      REDIS_URL: redis://redis:6379
      ES_URL: http://elasticsearch:9200
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - netflix-net

  frontend:
    build: ./frontend
    container_name: netflix-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - netflix-net

volumes:
  mongo_data:
  es_data:

networks:
  netflix-net:
    driver: bridge
